<VirtualHost *:80>
    ServerName 111.229.87.94
    DocumentRoot /var/www/html

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:5050/api connectiontimeout=5 timeout=180
    ProxyPassReverse /api http://127.0.0.1:5050/api
    ProxyPass /uploads http://127.0.0.1:5050/uploads connectiontimeout=5 timeout=180
    ProxyPassReverse /uploads http://127.0.0.1:5050/uploads

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    SetEnvIfNoCase Request_URI "^/api/ai/.*stream" no-gzip=1
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/healthdoc-error.log
    CustomLog ${APACHE_LOG_DIR}/healthdoc-access.log combined
</VirtualHost>
